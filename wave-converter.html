<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Converter</title>
    <script>
        function convert() {
            const frequency = parseFloat(document.getElementById('frequency').value);
            const medium = document.getElementById('medium').value;
            let speed;
            let wavelength;

            // Speed of sound in air (m/s)
            if (medium === 'sound') {
                speed = 343;
            } 
            // Speed of light in vacuum (m/s)
            else if (medium === 'light') {
                speed = 299792458;
            } 
            // Speed of water waves (m/s)
            else if (medium === 'water') {
                speed = 1482;
            }

            if (speed) {
                wavelength = speed / frequency;
                document.getElementById('result').innerText = `Wavelength: ${wavelength.toFixed(2)} meters`;
            } else {
                document.getElementById('result').innerText = 'Please select a valid medium.';
            }
        }
    </script>
</head>
<body>
    <h1>Interactive Wave Conversion Tool</h1>
    <label for="frequency">Frequency (Hz): </label>
    <input type="number" id="frequency" required>
    <br>
    <label for="medium">Select Medium:</label>
    <select id="medium">
        <option value="sound">Sound</option>
        <option value="light">Light</option>
        <option value="water">Water</option>
    </select>
    <br>
    <button onclick="convert()">Convert</button>
    <p id="result"></p>
</body>
</html>
